<div *ngIf="isLoggedIn()" class="mb-3">
  <button (click)="addTrip()" class="btn btn-info">Add Trip</button>
</div>

<!-- Search and Recommendation Controls -->
<div class="card mb-4">
  <div class="card-body">
    <h4 class="card-title">Find Your Trip</h4>
    <p class="text-muted">
      Search, filter, and sort trips using the enhanced recommendation algorithm.
    </p>

    <div class="row g-3">
      <div class="col-md-4">
        <label class="form-label">Keyword</label>
        <input
          type="text"
          class="form-control"
          [(ngModel)]="keyword"
          placeholder="beach, reef, resort..."
        />
      </div>

      <div class="col-md-3">
        <label class="form-label">Resort</label>
        <input
          type="text"
          class="form-control"
          [(ngModel)]="resort"
          placeholder="Resort name"
        />
      </div>

      <div class="col-md-2">
        <label class="form-label">Max Price</label>
        <input
          type="number"
          class="form-control"
          [(ngModel)]="maxPrice"
          placeholder="2500"
        />
      </div>

      <div class="col-md-3">
        <label class="form-label">Sort By</label>
        <select class="form-select" [(ngModel)]="sortBy">
          <option value="relevance">Best Match</option>
          <option value="price-low">Price: Low to High</option>
          <option value="price-high">Price: High to Low</option>
          <option value="length-short">Shortest Trip</option>
          <option value="length-long">Longest Trip</option>
          <option value="start-date">Start Date</option>
          <option value="name">Name</option>
        </select>
      </div>
    </div>

    <div class="mt-3">
      <button class="btn btn-primary me-2" (click)="searchTrips()">
        Search Trips
      </button>

      <button class="btn btn-outline-secondary" (click)="resetSearch()">
        Reset
      </button>
    </div>
  </div>
</div>

<p>{{ message }}</p>

<div class="row">
  <div *ngFor="let trip of trips" class="col-3 mb-4">
    <app-trip-card [trip]="trip"></app-trip-card>
  </div>
</div>
