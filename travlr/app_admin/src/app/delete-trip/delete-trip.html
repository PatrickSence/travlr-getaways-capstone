<div class="container mt-4">
  <div *ngIf="formError" class="alert alert-danger">
    {{ formError }}
  </div>

  <div class="card shadow-sm">
    <div class="card-body">
      <h2 class="card-title text-danger">Delete Trip</h2>

      <p class="mt-3">Are you sure you want to delete this trip?</p>

      <!-- <pre class="bg-light p-2 border rounded">{{ trip | json }}</pre> -->

      <ul class="list-unstyled mt-3">
        <li><strong>Code:</strong> {{ trip?.code }}</li>
        <li><strong>Name:</strong> {{ trip?.name }}</li>
        <li><strong>Resort:</strong> {{ trip?.resort }}</li>
        <li><strong>Start:</strong> {{ trip?.start }}</li>
      </ul>

      <div class="d-flex gap-2 mt-4">
        <button class="btn btn-danger" (click)="onDeleteSubmit()">
          Yes, Delete
        </button>

        <button class="btn btn-secondary" (click)="onCancel()">
          Cancel
        </button>
      </div>
    </div>
  </div>
</div>
