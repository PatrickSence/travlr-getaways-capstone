<div class="card p-2 m-2" style="width: 16rem;">
  <div class="card-header">{{ trip.name }}</div>

  <img
    [src]="'assets/images/' + trip.image"
    alt="trip thumbnail"
    class="card-img-top">

    <div class="card-body">
    <h6 class="card-subtitle mb-2 text-muted">
      {{ trip.resort }}
    </h6>

    <p class="card-subtitle mt-3 mb-3 text-muted">
      {{ trip.length }} only {{ trip.perPerson | currency:'USD':'symbol' }} per person
    </p>

    <p class="card-text">
      {{ trip.description }}
    </p>
<div *ngIf="isLoggedIn()" class="d-flex gap-2 flex-wrap mt-2">
  <button (click)="editTrip(trip.code)" class="btn btn-info flex-fill">
    Edit Trip
  </button>

  <button (click)="deleteTrip(trip.code)" class="btn btn-danger flex-fill">
    Delete Trip
  </button>
</div>
    </div>  
</div>
