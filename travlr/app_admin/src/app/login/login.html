<div class="container mt-4">
  <h2>Log In</h2>

  <form (ngSubmit)="onLoginSubmit()" #loginForm="ngForm">
    <div class="mb-3">
      <label for="name" class="form-label">Name</label>
      <input
        type="text"
        id="name"
        name="name"
        class="form-control"
        [(ngModel)]="credentials.name"
        required
      />
    </div>

    <div class="mb-3">
      <label for="email" class="form-label">Email</label>
      <input
        type="email"
        id="email"
        name="email"
        class="form-control"
        [(ngModel)]="credentials.email"
        required
      />
    </div>

    <div class="mb-3">
      <label for="password" class="form-label">Password</label>
      <input
        type="password"
        id="password"
        name="password"
        class="form-control"
        [(ngModel)]="credentials.password"
        required
      />
    </div>

    <button type="submit" class="btn btn-primary">Sign In</button>

    <div *ngIf="formError" class="text-danger mt-3">
      {{ formError }}
    </div>
  </form>
</div>
